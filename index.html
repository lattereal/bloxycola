<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bloxy Cola</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    img {
      width: 300px;
      cursor: pointer;
      user-select: none;
    }
  </style>
</head>
<body>
  <audio id="sound" src="bloxy.mp3"></audio>
  <img src="bloxy.png" alt="Bloxy Cola" onclick="
    var s = document.getElementById('sound');
    s.currentTime = 0;
    s.play();
  " />
</body>
</html>
